kind = "web"
previewPath = "/"
title = "Nyxion Labs"
version = "1.0.0"
id = "artifacts/nyxion-labs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24660

[services.development]
run = "pnpm --filter @workspace/nyxion-labs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nyxion-labs", "run", "build" ]
publicDir = "artifacts/nyxion-labs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24660"
BASE_PATH = "/"
